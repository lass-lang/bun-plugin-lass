name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      prerelease:
        description: 'Pre-release type'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - beta

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v6
        with:
          node-version: 22.x
          registry-url: 'https://registry.npmjs.org'

      - run: bun install --frozen-lockfile
      - run: bun run build
      - run: bun test

      # Stable release (automatic on main)
      - name: Create Release Pull Request or Publish
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: changesets/action@v1
        with:
          publish: bun run release
          title: 'chore: version packages'
          commit: 'chore: version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Beta pre-release (manual trigger)
      - name: Publish Beta Release
        if: github.event_name == 'workflow_dispatch' && inputs.prerelease == 'beta'
        run: |
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          EXISTING_BETAS=$(npm view "$PACKAGE_NAME" versions --json 2>/dev/null | grep -o "\"${CURRENT_VERSION}-beta\.[0-9]*\"" | wc -l || echo "0")
          NEXT_BETA=$((EXISTING_BETAS + 1))
          BETA_VERSION="${CURRENT_VERSION}-beta.${NEXT_BETA}"

          echo "Publishing beta version: $BETA_VERSION"
          npm version "$BETA_VERSION" --no-git-tag-version
          bun run build
          npm publish --tag beta --access public --no-git-checks
